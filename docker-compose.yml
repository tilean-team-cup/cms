services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - directus

  directus:
    image: directus/directus:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PUBLIC_URL: https://cms.tilea.net
      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://tileanteamcup.com,https://tilea.net,https://*.pages.dev,https://ttc2027.it"
      AUTH_PROVIDERS: keycloak
      AUTH_KEYCLOAK_DRIVER: openid
      AUTH_KEYCLOAK_LABEL: "Accedi con tilea.net"
      AUTH_KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      AUTH_KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      AUTH_KEYCLOAK_ISSUER_URL: https://id.tilea.net/realms/tilea
      AUTH_KEYCLOAK_REDIRECT_ALLOW_LIST: https://cms.tilea.net
      AUTH_KEYCLOAK_ALLOW_PUBLIC_REGISTRATION: "true"
      AUTH_KEYCLOAK_DEFAULT_ROLE_ID: ${KEYCLOAK_DEFAULT_ROLE_ID}
      EMAIL_TRANSPORT: smtp
      EMAIL_FROM: noreply@tilea.net
      EMAIL_SMTP_HOST: smtp-relay.brevo.com
      EMAIL_SMTP_PORT: "587"
      EMAIL_SMTP_USER: ${BREVO_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD}
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions

volumes:
  postgres_data:
  directus_uploads:
  directus_extensions:
